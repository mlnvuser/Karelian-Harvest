{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/body.css' %}">
    <link rel="stylesheet" href="{% static 'css/header.css' %}">
    <link rel="stylesheet" href="{% static 'css/slider.css' %}">
    <link rel="stylesheet" href="{% static 'css/products.css' %}">
    <link rel="stylesheet" href="{% static 'css/news.css' %}">
    <link rel="stylesheet" href="{% static 'css/footer.css' %}">
    <title>{% block title %}{% endblock %}</title>
</head>
<body>

<header class="head-container">
    <nav class="nav-container">
        <div class="logo">
            <a href=""><img id="nav-icon" src="{% static 'img/logo.png' %}" alt=""></a>
            <h1>Карельский Урожай <span><sup style="font-size: 10px; font-family: sans-serif">®</sup></span></h1>
        </div>
        <div class="navigation">
            <a href=""><h3>Главная</h3></a>
            <a href=""><h3>Продукты</h3></a>
            <a href=""><h3>Новости</h3></a>
            <a href=""><h3>Контакты</h3></a>
            <button class="btn" id="buy">Купить</button>
        </div>
    </nav>

</header>

{% block slider %}{% endblock %}
{% block products %}{% endblock %}
{% block news %}{% endblock %}

<footer class="foot-container">
    <p>2025 Карельский Урожай <span><sup style="font-size: 10px; font-family: sans-serif">®</sup></span></p>
</footer>

<script src="{% static 'js/scripts.js' %}"></script>
</body>
</html>
